name: DevSecOps Pipeline

on:
  push:
    branches:
      - main

  workflow_dispatch:


env:
  IMAGE_NAME: zomato-kastro


jobs:

################################################
# 1. BUILD REACT APPLICATION
################################################

  build:

    name: React Build

    runs-on: ubuntu-latest


    steps:

    - name: Checkout Code
      uses: actions/checkout@v4


    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20


    - name: Install Dependencies
      run: npm install


    - name: Build React Application
      run: npm run build



################################################
# 2. SONARQUBE SCAN
################################################

  sonarqube:

    name: SonarQube Analysis

    runs-on: ubuntu-latest

    needs: build


    steps:

    - name: Checkout Code
      uses: actions/checkout@v4


    - name: Create SonarQube Properties File

      run: |

        cat > sonar-project.properties <<EOF
        sonar.projectKey=zomato-kastro
        sonar.projectName=zomato-kastro
        sonar.sources=src
        sonar.sourceEncoding=UTF-8
        EOF


    - name: Check Sonar Properties

      run: |

        cat sonar-project.properties



    - name: SonarQube Scan

      uses: SonarSource/sonarqube-scan-action@v5

      with:

        projectBaseDir: .


      env:

        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

################################################
# 3. TRIVY FILE SYSTEM SCAN
################################################


  trivy-fs:


    name: Trivy File System Scan


    runs-on: ubuntu-latest


    needs: sonarqube



    steps:


    - name: Checkout Code

      uses: actions/checkout@v4



    - name: Install Trivy

      run: |

        sudo apt update

        sudo apt install wget -y


        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -


        echo "deb https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list


        sudo apt update


        sudo apt install trivy -y



    - name: Trivy File Scan

      run: |

        trivy fs . --severity HIGH,CRITICAL --exit-code 0




################################################
# 4. DOCKER BUILD AND PUSH
################################################


  docker:


    name: Docker Build Push


    runs-on: ubuntu-latest


    needs: trivy-fs



    steps:


    - name: Checkout Code

      uses: actions/checkout@v4




    - name: Docker Login


      uses: docker/login-action@v3


      with:


        username: ${{ secrets.DOCKER_USERNAME }}


        password: ${{ secrets.DOCKER_PASSWORD }}




    - name: Docker Build


      run: |


        docker build \
        -t ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest .





    - name: Trivy Image Scan


      uses: aquasecurity/trivy-action@master


      with:


        image-ref: '${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest'


        severity: 'HIGH,CRITICAL'


        exit-code: '0'




    - name: Push Docker Image


      run: |


        docker push \
        ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest





################################################
# 5. GMAIL NOTIFICATION
################################################


  email:


    name: Gmail Notification


    runs-on: ubuntu-latest


    needs: docker


    if: always()



    steps:


    - name: Send Email


      uses: dawidd6/action-send-mail@v3



      with:


        server_address: smtp.gmail.com


        server_port: 465


        username: ${{ secrets.EMAIL_USERNAME }}


        password: ${{ secrets.EMAIL_PASSWORD }}



        subject: DevSecOps Pipeline Result



        to: ${{ secrets.EMAIL_USERNAME }}



        from: GitHub Actions



        body: |

          DevSecOps Pipeline Completed

          Repository:
          ${{ github.repository }}

          Status:
          ${{ job.status }}
